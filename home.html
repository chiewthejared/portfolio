<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jared Chiew Portfolio</title>
    <link rel="stylesheet" href="home.css" />

<body>

        <div class="character-box">
