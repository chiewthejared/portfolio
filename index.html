<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Jared Chiew Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Intro Screen -->
    <div id="intro" class="screen">
        <h1 class="intro-title">JARED CHIEW PRESENTS</h1>
    </div>

    <!-- Loading Screen -->
    <div id="loading" class="screen">
        <p class="loading-text">Loading...</p>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="loading-percent" id="loadingPercent">0%</p>
    </div>

    <!-- Launch Game Screen -->
    <div id="main" class="screen" aria-hidden="true">
        <h1 class="portfolio-title">PORTFOLIO</h1>
        <p class="subtitle">Created by Jared Chiew</p>

        <button id="launchBtn" class="launch-btn">LAUNCH GAME</button>
    </div>

    <!-- JS -->
    <script src="index.js"></script>
</body>
</html>
