<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jared Chiew Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="work.css" />
</head>
<body>
  <!-- Boot Screen -->
  <div id="bootScreen" class="boot-screen">
    <div class="boot-content">
      <div class="boot-text">
        <div class="boot-line">SYSTEM INITIALIZING...</div>
        <div class="boot-line">MEMORY CHECK: OK</div>
        <div class="boot-line">DISPLAY DRIVER: LOADED</div>
        <div class="boot-line blink-cursor">READY</div>
      </div>
      <div class="boot-progress">
        <div class="boot-progress-bar" id="bootProgress"></div>
      </div>
    </div>
  </div>

  <!-- Computer Monitor -->
  <div class="monitor-container">
    <div class="monitor">
      <!-- Monitor Bezel -->
      <div class="bezel">
        <!-- Screen -->
        <div class="screen">
          <div class="desktop">
            <!-- Only one app: Work Log -->
            <div class="app-icon" id="workLogApp">
              <div class="app-icon-inner">
                <img src="images/work-app-icon.png" alt="Work Log" class="app-icon-image" />
                <span class="app-icon-label">Work Log</span>
              </div>
            </div>

            <!-- Power Off Button -->
            <button class="power-btn" id="powerBtn">
              <span class="power-icon">⏻</span>
              <span class="power-tooltip">Return to Menu</span>
            </button>

            <!-- App Window -->
            <div class="app-window" id="appWindow">
              <div class="window-header">
                <span class="window-title">📝 Work Log</span>
                <button class="window-close" id="closeWindow">✕</button>
              </div>
              <div class="window-body">
                <!-- Note List View -->
                <div class="note-list-view" id="noteListView">
                  <div class="note-item" data-note="0">
                    <div class="note-title">🏢 Sturge-Weber Foundation</div>
                    <div class="note-preview">Software Engineer · Sep 2025 - May 2026</div>
                  </div>
                  <div class="note-item" data-note="1">
                    <div class="note-title">☁️ Cloud Space Co</div>
                    <div class="note-preview">Data Engineer Intern · June 2025 - Aug 2025</div>
                  </div>
                </div>

                <!-- Note Detail View -->
                <div class="note-detail" id="noteDetail">
                  <div class="note-detail-header">
                    <button class="note-detail-back" id="backToNotes">◀</button>
                    <span class="note-detail-title" id="noteDetailTitle"></span>
                  </div>
                  <div class="note-detail-body" id="noteDetailBody"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Monitor Stand -->
      <div class="stand"></div>
      <div class="base"></div>
    </div>
  </div>

  <script src="work.js"></script>
</body>
</html>
