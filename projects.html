<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Jared Chiew — Projects</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="projects.css" />
</head>
<body>

  <!-- Tablet Container -->
  <div class="tablet-container">
    <div class="tablet">
      <!-- Tablet Bezel -->
      <div class="tablet-bezel">
        <!-- Screen -->
        <div class="tablet-screen">
          <div class="tablet-desktop">
            <!-- Status Bar -->
            <div class="status-bar">
              <span class="status-time">9:41</span>
              <span class="status-icons">📶 🔋</span>
            </div>

            <!-- Email App -->
            <div class="email-app">
              <!-- App Header -->
              <div class="app-header">
                <span class="app-title">📧 Projects</span>
                <button class="app-close" id="closeBtn">✕</button>
              </div>

              <!-- Email Layout: Sidebar + Content -->
              <div class="email-layout">
                <!-- Email List (Left) -->
                <div class="email-list" id="emailList">
                  <!-- JS will populate emails here -->
                </div>

                <!-- Email Content (Right) -->
                <div class="email-content" id="emailContent">
                  <div class="email-placeholder" id="placeholder">
                    <span>Select a project to view</span>
                  </div>
                  <div class="email-detail" id="emailDetail" style="display: none;">
                    <div class="email-header">
                      <h2 class="email-subject" id="emailSubject"></h2>
                      <span class="email-sender" id="emailSender"></span>
                    </div>
                    <div class="email-body" id="emailBody"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="projects.js"></script>
</body>
</html>
